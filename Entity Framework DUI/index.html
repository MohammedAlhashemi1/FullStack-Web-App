<!DOCTYPE html>
<html>
<head>
    <title>Tim Hortons – Order Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</head>

<body>

    <div class="headerBox">
        <h1>Welcome to Tim Horton</h1>
    </div>

    <hr>

    <!-- ============================= -->
    <!-- ICA10 ORDER RETRIEVAL SECTION -->
    <!-- ============================= -->

    <h3>Customer Id</h3>
    <input id="customerId" type="text">

    <h3>Select the location</h3>
    <select id="locationList"></select>

    <h2>Orders</h2>
    <div id="ordersArea"></div>

    <hr>

    <!-- ============================= -->
    <!-- ICA11 ORDER PROCESSING -->
    <!-- ============================= -->

    <h2>Order Processing</h2>
    <div id="orderMsg" class="msg"></div>

    <div class="formContainer">

        <label>Order Id:</label>
        <input id="orderId" type="text" readonly>

        <label>Customer Id:</label>
        <input id="procCustomerId" type="text">

        <label>Item ordered:</label>
        <select id="itemList"></select>

        <label>How many items:</label>
        <input id="itemCount" type="number" value="1">

        <label>How would you like to pay [credit/debit/cash]:</label>
        <select id="paymentList">
            <option value="">Select Payment Method</option>
            <option value="Credit">Credit</option>
            <option value="Debit">Debit</option>
            <option value="Cash">Cash</option>
        </select>

        <label>Select the Pickup location</label>
        <select id="pickupList"></select>

        <button id="btnPlace" class="btnPrimary">Place Order</button>
    </div>

    <footer>
        <p>Copyright © Mohammed</p>
    </footer>

</body>
</html>
